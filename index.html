-brand);box-shadow:0 0 0 4px rgba(215,25,32,.10)}input[readonly]{background:#f9fafb;color:#374151;font-weight:800}textarea{min-height:110px;resize:vertical}.hint{margin-top:7px;color:var(--muted);font-size:12px}.required{color:var(--brand)}.flight-wrap{display:flex;gap:8px}.prefix{height:46px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;border:1px solid #fecaca;background:#fff1f2;color:var(--brand-dark);border-radius:13px;font-weight:900}.btn{appearance:none;border:0;border-radius:999px;padding:11px 16px;font-weight:900;font-size:14px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.12s;white-space:nowrap}.btn:hover{transform:translateY(-1px)}.btn-primary{background:var(--brand);color:#fff;box-shadow:0 10px 20px rgba(215,25,32,.2)}.btn-primary:hover{background:var(--brand-dark)}.btn-ghost{background:#fff;color:#374151;border:1px solid var(--line)}.btn-danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}.btn-small{padding:9px 12px;font-size:13px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 13px;font-weight:900;cursor:pointer}.tab.active{border-color:#fecaca;background:#fff1f2;color:var(--brand-dark)}.section-title{font-weight:900;margin:18px 0 10px;font-size:16px}.checklist{display:grid;gap:14px}.item{border:1px solid var(--line);border-radius:20px;background:#fff;overflow:hidden}.item-top{padding:16px 18px;border-bottom:1px solid var(--line);background:var(--soft);display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.item-title{margin:0;font-size:15px;font-weight:900;letter-spacing:-.035em;word-break:keep-all}.item-meta{margin:6px 0 0;color:var(--muted);font-size:12px}.choice-group{display:inline-flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.choice input{position:absolute;opacity:0;pointer-events:none}.choice span{min-width:54px;height:36px;padding:0 13px;border:1px solid #d1d5db;border-radius:999px;background:#fff;color:#374151;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;cursor:pointer}.choice input:checked+span.ok{background:#ecfdf5;color:var(--ok);border-color:#86efac}.choice input:checked+span.bad{background:#fef2f2;color:var(--bad);border-color:#fca5a5}.choice input:checked+span.na{background:#f1f5f9;color:var(--na);border-color:#cbd5e1}.item-body{padding:16px 18px 18px}.selected-path{padding:11px 13px;border:1px dashed #fecaca;background:#fff7f7;border-radius:13px;margin-bottom:10px;color:#7f1d1d;font-size:13px;font-weight:800}.correction{border:1px solid #fecaca;background:#fffafa;border-radius:18px;padding:16px;margin-bottom:12px}.correction-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.correction-title{font-weight:900;color:#7f1d1d}.footer-actions{position:sticky;bottom:0;z-index:8;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:22px;box-shadow:0 -12px 28px rgba(15,23,42,.08);padding:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px}.save-note{color:var(--muted);font-size:13px;font-weight:800}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.52);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modal{width:min(820px,100%);max-height:82vh;overflow:hidden;background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(15,23,42,.28);display:flex;flex-direction:column}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.modal-body{padding:18px 20px;overflow:auto;background:#f8fafc}pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:Consolas,Monaco,"Courier New",monospace;font-size:12px;line-height:1.55}.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 14px 30px rgba(0,0,0,.2);font-size:14px;font-weight:900;opacity:0;pointer-events:none;transition:.18s;z-index:70}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:760px){.hero-inner,.footer-actions,.card-head{align-items:stretch;flex-direction:column}.actions{justify-content:flex-start}.field,.field.third{grid-column:1/-1}.item-top{grid-template-columns:1fr}.choice-group{justify-content:flex-start}.btn{width:100%}}

/* Mobile/Android usability improvements */
html { -webkit-text-size-adjust: 100%; }
button, select, input, textarea { touch-action: manipulation; }
@media (max-width: 900px) {
  body { background: #f6f7f9; }
  .page { width: 100%; max-width: 100%; padding: 14px 10px 28px; }
  .hero { position: static; margin: -14px -10px 14px; padding: 14px 12px; }
  .hero-inner { gap: 12px; }
  .top-actions { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 8px; }
  .top-actions .btn { width: 100%; min-height: 46px; }
  .card { border-radius: 16px; margin-bottom: 14px; box-shadow: 0 6px 18px rgba(15,23,42,.05); }

  .card-body { padding: 14px; }
  .grid { display: block; }
  .field, .field.third, .field.full { width: 100%; margin-bottom: 12px; }

  textarea { min-height: 96px; }
  .flight-wrap { width: 100%; }
  .flight-wrap input { min-width: 0; }
  .prefix { height: 46px; }
  .correction { padding: 12px; border-radius: 16px; }
  .correction-head { align-items: stretch; }
  .correction-title { display:flex; align-items:center; }
  .removeCorrectionBtn { width: auto; min-width: 72px; }
  .selected-path { font-size: 12px; line-height: 1.45; }
}
@media (max-width: 420px) {
  h1 { font-size: 22px; }
  .subtitle { font-size: 12px; }
  .card-title { font-size: 17px; }
  .card-desc { font-size: 12px; }
  .top-actions { grid-template-columns: 1fr 1fr; }
}


/* Android/Chrome layout override - keep form readable across mobile widths */
@media (max-width: 980px) {
  .page { max-width: 100%; width: 100%; padding: 14px 10px 32px; overflow-x: hidden; }
  .hero { position: static; margin: -14px -10px 14px; padding: 14px 12px; }
  .hero-inner { flex-direction: column; align-items: stretch; justify-content: flex-start; gap: 12px; }
  .actions, .top-actions { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; justify-content: stretch; }
  .actions .btn, .top-actions .btn { width: 100%; min-height: 48px; }
  .card { width: 100%; border-radius: 16px; margin-bottom: 14px; }
  .card-head { flex-direction: column; align-items: stretch; padding: 14px; }
  .card-body { padding: 14px; }
  .grid { display: grid; grid-template-columns: 1fr !important; gap: 12px; }
  .field, .field.third, .field.full { grid-column: 1 / -1 !important; width: 100%; margin-bottom: 0; }
  .flight-wrap { width: 100%; }
  .flight-wrap input { flex: 1 1 auto; min-width: 0; }
  input, select, textarea { font-size: 16px; min-height: 48px; padding: 12px; }
  textarea { min-height: 96px; }
  .correction { padding: 12px; border-radius: 16px; }
  .correction-head { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px; }
  .removeCorrectionBtn { width: auto !important; min-width: 72px; }
  #addCorrectionBtn { min-height: 48px; }
}

@media (max-width: 430px) {
  h1 { font-size: 21px; }
  .eyebrow { font-size: 14px; }
  .subtitle, .card-desc, .hint { font-size: 12px; }
  .card-title { font-size: 17px; }
  .selected-path { font-size: 12px; line-height: 1.45; }
}

</style>
</head>

<div class="page">
<header class="hero"><div class="hero-inner"><div><div class="eyebrow">Cabin Quality Auditor</div><h1>객실품질심사원 현장시정 보고서</h1><p class="subtitle">Cabin Operation 현장시정 사항을 작성하고 JSON 파일로 저장합니다.</p></div></div></header>
<form id="auditForm" autocomplete="off">

<div class="field third"><label class="field-label" for="inspectionDate">점검 날짜 <span class="required">*</span></label><input type="date" id="inspectionDate" required><div class="hint" id="dateText">달력에서 날짜를 선택하세요.</div></div>
<div class="field third"><label class="field-label" for="flightNumber">편명 <span class="required">*</span></label><div class="flight-wrap"><span class="prefix">ZE</span><input type="text" id="flightNumber" inputmode="numeric" maxlength="4" placeholder="예: 581" required></div><div class="hint">숫자만 입력하세요</div></div>
<div class="field third"><label class="field-label" for="category">점검분야 <span class="required">*</span></label><input type="text" id="category" value="Cabin Operation" readonly><div class="hint">현재는 Cabin Operation으로 고정됩니다.</div></div>
<div class="field full"><label class="field-label" for="registrant">작성자 <span class="required">*</span></label><input type="text" id="registrant" placeholder="예: 홍길동" required></div>
</div></div></section>
<section class="card"><div class="card-head"><div><h2 class="card-title">현장시정 항목</h2><p class="card-desc">카테고리와 세부 항목을 선택한 후 현장시정 Comment를 작성합니다. 항목이 하나 이상일 경우 + 버튼으로 계속 추가할 수 있습니다.</p></div></div><div class="card-body"><div id="corrections"></div><button class="btn btn-primary btn-small" type="button" id="addCorrectionBtn" style="margin-top:12px;width:100%;">+ 현장시정 추가</button><button class="btn btn-primary btn-small" type="button" id="saveTopBtn" style="margin-top:10px;width:100%;">JSON 저장</button></div></section>
</form>
</div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal"><div class="modal-head"><h2>저장될 JSON Data 미리보기</h2><div class="actions"><button class="btn btn-primary btn-small" type="button" id="copyJsonBtn">JSON 복사</button><button class="btn btn-ghost btn-small" type="button" id="closeModalBtn">닫기</button></div></div><div class="modal-body"><pre id="jsonPreview"></pre></div></div></div><div class="toast" id="toast"></div>

var checklistGroups = [{ id: 'CAB01', title: 'Ⅰ. 운항 전 근무 절차(Pre-FLT Duty Procedure)', items: [
            { no: '1', text: 'C.C.O.M 의 최신판을 유지하고 있으며 훈련 이력기록지(Training Record)를 휴대하고 있는가?', basis: 'C.C.O.M 1.3.8 / C.C.O.M 3.4.5' },
            { no: '2', text: '자격 유지를 위한 일정교육을 이수하였는가?', basis: 'C.C.O.M 3.4' },

var correctionCount = 0;
var lastAddAt = 0;
var corrections = document.getElementById('corrections');
var toast = document.getElementById('toast');

function escapeHtml(value) {
  value = value == null ? '' : String(value);
  return value.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function showToast(message) {
  if (!toast) { return; }
  toast.innerHTML = escapeHtml(message);
  if (toast.className.indexOf('show') < 0) { toast.className += ' show'; }
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(function () { toast.className = toast.className.replace(' show', ''); }, 2000);
}
function makeOption(value, text) {
  var opt = document.createElement('option');
  opt.value = value;
  opt.appendChild(document.createTextNode(text));
  return opt;
}
function clearSelect(sel) {
  while (sel.options.length) { sel.remove(0); }
}
function getParentCorrection(el) {
  while (el && el !== document) {
    if ((' ' + el.className + ' ').indexOf(' correction ') >= 0) { return el; }
    el = el.parentNode;
  }
  return null;
}
function hasClass(el, name) {
  return el && (' ' + el.className + ' ').indexOf(' ' + name + ' ') >= 0;
}
function updateCorrectionSelects(groupSelect) {
  var wrap = getParentCorrection(groupSelect);
  if (!wrap) { return; }
  var itemSelect = wrap.getElementsByClassName ? wrap.getElementsByClassName('correctionItem')[0] : wrap.querySelector('.correctionItem');
  var path = wrap.getElementsByClassName ? wrap.getElementsByClassName('correctionPath')[0] : wrap.querySelector('.correctionPath');
  var selectedText = wrap.getElementsByClassName ? wrap.getElementsByClassName('selectedChecklistText')[0] : wrap.querySelector('.selectedChecklistText');
  clearSelect(itemSelect);
  itemSelect.appendChild(makeOption('', '세부 항목을 선택하세요'));
  var gi = groupSelect.value === '' ? -1 : parseInt(groupSelect.value, 10);
  var group = checklistGroups[gi];
  if (!group) {
    itemSelect.options[0].text = '대분류를 먼저 선택하세요';
    path.innerHTML = '선택 항목을 지정하면 이곳에 문장으로 표시됩니다.';
    selectedText.value = '';
    return;
  }
  for (var i = 0; i < group.items.length; i++) {
    itemSelect.appendChild(makeOption(String(i), group.items[i].no + '. ' + group.items[i].text));
  }
  path.innerHTML = '선택 대분류: ' + escapeHtml(group.title);
  selectedText.value = '';
}
function updateCorrectionItem(itemSelect) {
  var wrap = getParentCorrection(itemSelect);
  if (!wrap) { return; }
  var groupSelect = wrap.getElementsByClassName ? wrap.getElementsByClassName('correctionGroup')[0] : wrap.querySelector('.correctionGroup');
  var path = wrap.getElementsByClassName ? wrap.getElementsByClassName('correctionPath')[0] : wrap.querySelector('.correctionPath');
  var selectedText = wrap.getElementsByClassName ? wrap.getElementsByClassName('selectedChecklistText')[0] : wrap.querySelector('.selectedChecklistText');
  var gi = groupSelect.value === '' ? -1 : parseInt(groupSelect.value, 10);
  var ii = itemSelect.value === '' ? -1 : parseInt(itemSelect.value, 10);
  var group = checklistGroups[gi];
  var item = group && group.items[ii];
  if (!group || !item) {
    path.innerHTML = group ? '선택 대분류: ' + escapeHtml(group.title) : '선택 항목을 지정하면 이곳에 문장으로 표시됩니다.';
    selectedText.value = '';
    return;
  }
  path.innerHTML = '선택 항목: ' + escapeHtml(group.title + ' > ' + item.no + '. ' + item.text);
  selectedText.value = group.title + '\n' + item.no + '. ' + item.text;
}
function buildGroupSelect() {
  var sel = document.createElement('select');
  sel.className = 'correctionGroup';
  sel.onchange = function () { updateCorrectionSelects(this); };
  sel.appendChild(makeOption('', '선택'));
  for (var i = 0; i < checklistGroups.length; i++) {
    sel.appendChild(makeOption(String(i), checklistGroups[i].title));
  }
  return sel;
}
function buildItemSelect() {
  var sel = document.createElement('select');
  sel.className = 'correctionItem';
  sel.onchange = function () { updateCorrectionItem(this); };
  sel.appendChild(makeOption('', '대분류를 먼저 선택하세요'));
  return sel;
}
function field(labelText, element, full) {
  var div = document.createElement('div');
  div.className = full ? 'field full' : 'field';
  var label = document.createElement('label');
  label.className = 'field-label';
  label.appendChild(document.createTextNode(labelText));
  div.appendChild(label);
  div.appendChild(element);
  return div;
}
function addCorrection() {
  correctionCount += 1;
  var id = correctionCount;
  var wrap = document.createElement('div');
  wrap.className = 'correction';

  var head = document.createElement('div');
  head.className = 'correction-head';
  var title = document.createElement('div');
  title.className = 'correction-title';
  title.appendChild(document.createTextNode('현장시정 항목 ' + id));
  var remove = document.createElement('button');
  remove.type = 'button';
  remove.className = 'btn btn-danger btn-small removeCorrectionBtn';
  remove.appendChild(document.createTextNode('삭제'));
  remove.onclick = function () { if (wrap.parentNode) { wrap.parentNode.removeChild(wrap); } return false; };
  head.appendChild(title);
  head.appendChild(remove);
  wrap.appendChild(head);

  var grid = document.createElement('div');
  grid.className = 'grid';
  grid.appendChild(field('대분류', buildGroupSelect(), false));
  grid.appendChild(field('세부 항목', buildItemSelect(), false));

  var pathWrap = document.createElement('div');
  pathWrap.className = 'field full';
  var path = document.createElement('div');
  path.className = 'selected-path correctionPath';
  path.appendChild(document.createTextNode('선택 항목을 지정하면 이곳에 문장으로 표시됩니다.'));
  pathWrap.appendChild(path);
  grid.appendChild(pathWrap);

  var selected = document.createElement('textarea');
  selected.className = 'selectedChecklistText';
  selected.readOnly = true;
  selected.placeholder = '세부 항목 선택 시 점검리스트가 자동 반영됩니다.';
  grid.appendChild(field('선택된 점검리스트', selected, true));

  var comment = document.createElement('textarea');
  comment.className = 'correctionComment';
  comment.placeholder = '현장시정 내용 및 Comment를 작성하세요.';
  grid.appendChild(field('Comment', comment, true));

  wrap.appendChild(grid);
  corrections.appendChild(wrap);
  return wrap;
}
function handleAddCorrection(event) {
  if (event && event.preventDefault) { event.preventDefault(); }
  if (event && event.stopPropagation) { event.stopPropagation(); }
  var now = new Date().getTime();
  if (now - lastAddAt < 700) { return false; }
  lastAddAt = now;
  var latest = addCorrection();
  showToast('현장시정 항목이 추가되었습니다.');
  try { latest.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (e) { try { latest.scrollIntoView(true); } catch (e2) {} }
  return false;
}
function formatDate(value) {
  if (!value) { return '달력에서 날짜를 선택하세요.'; }
  var d = new Date(value + 'T00:00:00');
  return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
}
function collectData() {
  var inspectionDate = document.getElementById('inspectionDate').value;
  var flightDigits = document.getElementById('flightNumber').value.replace(/[^0-9]/g, '');
  var author = document.getElementById('registrant').value.replace(/^\s+|\s+$/g, '');
  var nodes = corrections ? corrections.getElementsByClassName('correction') : [];
  var correctionData = [];
  for (var i = 0; i < nodes.length; i++) {
    var el = nodes[i];
    var groupSelect = el.getElementsByClassName('correctionGroup')[0];
    var itemSelect = el.getElementsByClassName('correctionItem')[0];
    var gi = groupSelect && groupSelect.value !== '' ? parseInt(groupSelect.value, 10) : -1;
    var ii = itemSelect && itemSelect.value !== '' ? parseInt(itemSelect.value, 10) : -1;
    var group = checklistGroups[gi];
    var item = group && group.items[ii];
    var selectedText = el.getElementsByClassName('selectedChecklistText')[0];
    var comment = el.getElementsByClassName('correctionComment')[0];
    var commentValue = comment ? comment.value.replace(/^\s+|\s+$/g, '') : '';
    if (group || commentValue) {
      correctionData.push({
        no: correctionData.length + 1,
        groupId: group ? group.id : '',
        groupTitle: group ? group.title : '',
        itemNo: item ? item.no : '',
        item: item ? item.text : '',
        selectedSentence: item ? group.title + ' > ' + item.no + '. ' + item.text : '',
        checklistText: selectedText ? selectedText.value.replace(/^\s+|\s+$/g, '') : '',
        comment: commentValue
      });
    }
  }
  return {
    dataType: 'cabinQualityAuditorFieldCorrection',
    version: '0.14-direct-json-download',
    savedAt: new Date().toISOString(),
    inspectionDate: inspectionDate,
    inspectionDateText: formatDate(inspectionDate),
    flightNo: flightDigits ? 'ZE ' + flightDigits : '',
    author: author,
    category: 'Cabin Operation',
    fieldCorrections: correctionData,
    summary: { fieldCorrectionCount: correctionData.length }
  };
}
function validate(data) {
  var missing = [];
  if (!data.inspectionDate) { missing.push('점검 날짜'); }
  if (!data.flightNo) { missing.push('편명'); }
  if (!data.author) { missing.push('작성자'); }
  if (missing.length) {
    alert('필수 입력값을 확인해 주세요.\n\n- ' + missing.join('\n- '));
    return false;
  }
  return true;
}
function saveJson() {
  var data = collectData();
  if (!validate(data)) { return false; }

  var name = ['객실품질심사원_현장시정Data', data.inspectionDate, data.flightNo.replace(/\s/g, ''), data.author]
    .join('_')
    .replace(/[\\\/:*?"<>|]/g, '') + '.json';

  var text = JSON.stringify(data, null, 2);
  var blob = new Blob([text], { type: 'application/json;charset=utf-8' });

  // 기본 저장 방식: iPhone/Android/PC 모두 파일 다운로드를 우선 시도
  // Web Share API는 공유창으로 연결될 수 있어 우선 사용하지 않음
  try {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.rel = 'noopener';
    a.style.display = 'none';
    document.body.appendChild(a);

    // Safari 대응: 사용자 클릭 이벤트 안에서 즉시 실행되도록 유지
    if (typeof a.click === 'function') {
      a.click();
    } else {
      var evt = document.createEvent('MouseEvents');
      evt.initMouseEvent('click', true, true, window, 1, 0, 0, 0, 0, false, false, false, false, 0, null);
      a.dispatchEvent(evt);
    }

    setTimeout(function () {
      try { document.body.removeChild(a); } catch (e1) {}
      try { URL.revokeObjectURL(url); } catch (e2) {}
    }, 1500);

    showToast('JSON 파일 저장을 요청했습니다.');
  } catch (e) {
    // 직접 파일 저장이 막힌 경우에만 복사/미리보기 fallback
    showJsonFallback(text);
  }
  return false;
}
function showJsonFallback(text) {
  document.getElementById('jsonPreview').textContent = text;
  document.getElementById('modalBackdrop').style.display = 'flex';
  alert('이 브라우저에서 직접 다운로드가 제한될 수 있습니다. JSON 복사 버튼으로 내용을 복사해 .json 파일로 저장하세요.');
}
function copyJsonToClipboard() {
  var text = document.getElementById('jsonPreview').textContent || JSON.stringify(collectData(), null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { showToast('JSON 내용이 복사되었습니다.'); }).catch(function () { fallbackCopyText(text); });
  } else {
    fallbackCopyText(text);
  }
  return false;
}
function fallbackCopyText(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', 'readonly');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('JSON 내용이 복사되었습니다.'); }
  catch (e) { alert('복사가 제한되었습니다. 미리보기 내용을 길게 눌러 직접 복사하세요.'); }
  document.body.removeChild(ta);
}
function preview() {
  document.getElementById('jsonPreview').textContent = JSON.stringify(collectData(), null, 2);
  document.getElementById('modalBackdrop').style.display = 'flex';
  return false;
}
function resetAll() {
  if (confirm('입력한 내용을 모두 초기화할까요?')) { location.reload(); }
  return false;
}
function closeModal() {
  document.getElementById('modalBackdrop').style.display = 'none';
  return false;
}
function init() {
  var dateEl = document.getElementById('inspectionDate');
  var flightEl = document.getElementById('flightNumber');
  var addTop = document.getElementById('addCorrectionBtn');
  var saveTop = document.getElementById('saveTopBtn');
  var copyJsonBtn = document.getElementById('copyJsonBtn');
  var closeModalBtn = document.getElementById('closeModalBtn');
  if (addTop) { addTop.onclick = handleAddCorrection; }
  if (saveTop) { saveTop.onclick = saveJson; }
  if (copyJsonBtn) { copyJsonBtn.onclick = copyJsonToClipboard; }
  if (closeModalBtn) { closeModalBtn.onclick = closeModal; }
  if (dateEl) {
    dateEl.onchange = function () { document.getElementById('dateText').innerHTML = escapeHtml(formatDate(this.value)); };
  }
  if (flightEl) {
    flightEl.oninput = function () { this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4); };
  }
  var modal = document.getElementById('modalBackdrop');
  if (modal) {
    modal.onclick = function (e) { e = e || window.event; if ((e.target || e.srcElement) === modal) { modal.style.display = 'none'; } };
  }
  if (corrections && corrections.getElementsByClassName('correction').length === 0) { addCorrection(); }
}
window.addCorrection = addCorrection;
window.handleAddCorrection = handleAddCorrection;
window.saveJson = saveJson;
window.preview = preview;
window.resetAll = resetAll;
window.closeModal = closeModal;
window.onload = init;
if (document.readyState === 'complete' || document.readyState === 'interactive') { setTimeout(init, 0); }
</script>
</body>
</html>
